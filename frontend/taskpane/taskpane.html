<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EY AI Pitch</title>
    <link rel="stylesheet" href="./taskpane.css?v=dev-20260721-clarification-reply">
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="masthead">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h1>EY AI Pitch</h1>
          <p>PowerPoint slide generation</p>
        </div>
      </header>

      <section id="promptPanel" class="prompt-panel" aria-labelledby="prompt-label">
        <label id="prompt-label" for="slidePrompt">Describe the slide you want</label>
        <textarea
          id="slidePrompt"
          rows="12"
          placeholder="Example: Generate a detailed Current State operating model for the Procure-to-Pay process..."
        ></textarea>

        <button id="createPlanButton" type="button">
          Create Plan
        </button>
      </section>

      <section id="planPanel" class="plan-panel" aria-labelledby="plan-heading" hidden>
        <div class="plan-panel-header">
          <div>
            <h2 id="plan-heading">Review deck plan</h2>
            <p id="planSummary"></p>
          </div>
          <button id="backToPromptButton" class="secondary-button" type="button">
            Back
          </button>
        </div>

        <div id="planList" class="plan-list"></div>

        <div class="plan-actions">
          <button id="addSlideButton" class="secondary-button" type="button">
            Add Slide
          </button>
          <button id="generateDeckButton" type="button">
            Generate Deck
          </button>
        </div>
      </section>

      <section class="status-panel" aria-live="polite">
        <span>Status:</span>
        <strong id="statusText">Ready</strong>
      </section>
    </main>

    <script src="./taskpane.js?v=dev-20260721-clarification-reply"></script>
  </body>
</html>
